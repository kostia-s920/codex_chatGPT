# Streamlit Community Cloud -> App settings -> Secrets.
# Create a Google Sheet, share it with the service account as Editor,
# then put the spreadsheet ID here.

GOOGLE_SHEET_ID = "paste_spreadsheet_id_here"
PUBLIC_BASE_URL = "https://your-app-name.streamlit.app"

[google_service_account]
type = "service_account"
project_id = "academyocean-keywords"
private_key_id = "paste_private_key_id"
private_key = """-----BEGIN PRIVATE KEY-----
paste_private_key_here
-----END PRIVATE KEY-----"""
client_email = "academyocean-keywords@academyocean-keywords.iam.gserviceaccount.com"
client_id = "paste_client_id"
auth_uri = "https://accounts.google.com/o/oauth2/auth"
token_uri = "https://oauth2.googleapis.com/token"
auth_provider_x509_cert_url = "https://www.googleapis.com/oauth2/v1/certs"
client_x509_cert_url = "paste_client_x509_cert_url"
universe_domain = "googleapis.com"
